<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <script src="DBAccess.js" defer></script>
    <link rel="stylesheet" href="index.css">
    <style>
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌟 ユーザー一覧ダッシュボード</h1>
      <div class="card form-area">
        <h3 id="form-title">✨ 新しいユーザーを追加</h3>
        <input type="hidden" id="edit-id">
        <div class="input-group">
          <input type="text" id="input=name" placeholder="名前（例: Akari）">
          <input type="number" id="input-age" placeholder="年齢（例: 15）">
          <button id="save-btn" class="btn primary">保存する</button>
          <button id="cancel-btn" class="btn secondary" style="display: none;">キャンセル</button>
        </div>
      </div>
      <div class="card table-area">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>名前</th><th>年齢</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
